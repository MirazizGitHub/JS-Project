<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skeleton Animation Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0d0d0d;
    --panel: #141414;
    --panel2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #c8f025;
    --accent2: #f0a825;
    --text: #e8e8e8;
    --muted: #666;
    --canvas-bg: #111;
    --bone-color: #ffffff;
    --bone-selected: #c8f025;
    --bone-hover: #f0a825;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* TOPBAR */
  #topbar {
    height: 46px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 24px;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .logo span { color: var(--muted); font-weight: 400; }

  .topbar-sep { width: 1px; height: 20px; background: var(--border); }

  .topbar-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .topbar-btn:hover { border-color: var(--accent); color: var(--accent); }
  .topbar-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

  .topbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

  #fps-display {
    font-size: 11px;
    color: var(--muted);
    background: var(--panel2);
    padding: 4px 10px;
    border-radius: 3px;
    border: 1px solid var(--border);
  }

  /* MAIN LAYOUT */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* LEFT PANEL */
  #left-panel {
    width: 220px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--border);
  }

  /* BONES LIST */
  #bones-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  #bones-list::-webkit-scrollbar { width: 4px; }
  #bones-list::-webkit-scrollbar-track { background: transparent; }
  #bones-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .bone-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    cursor: pointer;
    font-size: 12px;
    color: var(--muted);
    transition: all 0.1s;
    border-left: 2px solid transparent;
  }
  .bone-item:hover { background: var(--panel2); color: var(--text); }
  .bone-item.selected {
    background: rgba(200, 240, 37, 0.08);
    color: var(--accent);
    border-left-color: var(--accent);
  }

  .bone-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }
  .bone-item.selected .bone-dot { background: var(--accent); }
  .bone-item:hover .bone-dot { background: var(--text); }

  .bone-add-section {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .add-btn {
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 7px 10px;
    cursor: pointer;
    border-radius: 3px;
    text-align: left;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(200,240,37,0.05); }

  .delete-btn {
    background: none;
    border: 1px solid #333;
    color: #666;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 6px 10px;
    cursor: pointer;
    border-radius: 3px;
    text-align: left;
    transition: all 0.15s;
  }
  .delete-btn:hover { border-color: #ff4444; color: #ff4444; }

  /* PROPERTIES PANEL */
  #props-panel {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    background: var(--panel2);
  }

  .prop-row {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    gap: 6px;
  }

  .prop-label {
    font-size: 10px;
    color: var(--muted);
    width: 60px;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }

  .prop-input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 7px;
    border-radius: 3px;
    min-width: 0;
    transition: border-color 0.15s;
  }
  .prop-input:focus { outline: none; border-color: var(--accent); }

  /* CENTER - CANVAS */
  #center {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #canvas-toolbar {
    height: 36px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    flex-shrink: 0;
  }

  .tool-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .tool-btn:hover { color: var(--text); border-color: var(--border); }
  .tool-btn.active { background: var(--panel2); color: var(--accent); border-color: var(--accent); }

  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--canvas-bg);
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  #main-canvas {
    position: absolute;
    top: 0; left: 0;
    cursor: crosshair;
  }

  /* COORDS DISPLAY */
  #coords {
    position: absolute;
    bottom: 10px;
    left: 12px;
    font-size: 10px;
    color: var(--muted);
    pointer-events: none;
    letter-spacing: 0.5px;
  }

  /* RIGHT PANEL */
  #right-panel {
    width: 260px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* KEYFRAMES */
  #keyframe-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #keyframe-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  #keyframe-list::-webkit-scrollbar { width: 4px; }
  #keyframe-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .keyframe-item {
    padding: 7px 14px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.1s;
    display: flex;
    align-items: center;
    gap: 8px;
    border-left: 2px solid transparent;
  }
  .keyframe-item:hover { background: var(--panel2); color: var(--text); }
  .keyframe-item.selected { background: rgba(240,168,37,0.08); color: var(--accent2); border-left-color: var(--accent2); }

  .kf-time {
    font-size: 10px;
    color: var(--muted);
    margin-left: auto;
    background: var(--panel2);
    padding: 2px 6px;
    border-radius: 2px;
  }
  .keyframe-item.selected .kf-time { background: rgba(240,168,37,0.15); color: var(--accent2); }

  .kf-btn-row {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
  }

  .kf-btn {
    flex: 1;
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 6px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .kf-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .kf-btn.play-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(200,240,37,0.08); }

  /* TIMELINE */
  #timeline {
    height: 110px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  #timeline-header {
    height: 30px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }

  #timeline-track {
    flex: 1;
    position: relative;
    overflow-x: auto;
    overflow-y: hidden;
  }
  #timeline-track::-webkit-scrollbar { height: 4px; }
  #timeline-track::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  #timeline-canvas {
    height: 100%;
    cursor: pointer;
  }

  /* CODE OUTPUT */
  #code-section {
    border-top: 1px solid var(--border);
    background: var(--panel);
  }

  #code-header {
    display: flex;
    align-items: center;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }

  #code-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    flex: 1;
  }

  .copy-btn {
    background: var(--accent);
    border: none;
    color: #000;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    padding: 5px 12px;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .copy-btn:hover { background: #d4f52a; transform: translateY(-1px); }
  .copy-btn:active { transform: translateY(0); }
  .copy-btn.copied { background: var(--accent2); }

  #code-output {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    background: #0a0a0a;
    color: #888;
    padding: 10px 14px;
    height: 80px;
    overflow-y: auto;
    white-space: pre;
    line-height: 1.6;
    border: none;
    resize: none;
    width: 100%;
    letter-spacing: 0.3px;
  }
  #code-output::-webkit-scrollbar { width: 4px; }
  #code-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* PLAYBACK INDICATOR */
  #play-indicator {
    position: absolute;
    top: 8px;
    right: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--muted);
  }
  .play-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
  }
  .play-dot.active {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 0.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .status-bar {
    height: 22px;
    background: #0a0a0a;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 16px;
    flex-shrink: 0;
  }
  .status-item {
    font-size: 9px;
    color: #444;
    letter-spacing: 0.5px;
  }
  .status-item span { color: var(--muted); }
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo">SKEL<span>EDITOR</span></div>
  <div class="topbar-sep"></div>
  <button class="topbar-btn active" id="btn-select">SELECT</button>
  <button class="topbar-btn" id="btn-add-bone">+ BONE</button>
  <button class="topbar-btn" id="btn-move">MOVE</button>
  <button class="topbar-btn" id="btn-rotate">ROTATE</button>
  <div class="topbar-sep"></div>
  <button class="topbar-btn" id="btn-clear">CLEAR</button>
  <div class="topbar-right">
    <div id="fps-display">FPS: 60</div>
    <button class="topbar-btn" id="btn-play">▶ PLAY</button>
    <button class="topbar-btn" id="btn-stop">■ STOP</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT PANEL -->
  <div id="left-panel">
    <div class="panel-title">Bones</div>
    <div id="bones-list"></div>
    <div class="bone-add-section">
      <button class="add-btn" onclick="addRectangleBone()">+ Rectangle</button>
      <button class="add-btn" onclick="addCircleBone()">+ Circle</button>
      <button class="add-btn" onclick="addLineBone()">+ Line Bone</button>
      <button class="delete-btn" onclick="deleteSelected()">✕ Delete Selected</button>
    </div>
    <div id="props-panel">
      <div class="panel-title" style="padding:0 0 8px; border:none;">Properties</div>
      <div class="prop-row">
        <div class="prop-label">x</div>
        <input class="prop-input" id="prop-x" type="number" value="0" onchange="updateBoneProp('x', this.value)">
        <div class="prop-label" style="width:auto">y</div>
        <input class="prop-input" id="prop-y" type="number" value="0" onchange="updateBoneProp('y', this.value)">
      </div>
      <div class="prop-row">
        <div class="prop-label">w</div>
        <input class="prop-input" id="prop-w" type="number" value="60" onchange="updateBoneProp('w', this.value)">
        <div class="prop-label" style="width:auto">h</div>
        <input class="prop-input" id="prop-h" type="number" value="16" onchange="updateBoneProp('h', this.value)">
      </div>
      <div class="prop-row">
        <div class="prop-label">angle</div>
        <input class="prop-input" id="prop-angle" type="number" value="0" onchange="updateBoneProp('angle', this.value)">
        <div style="font-size:10px;color:var(--muted)">°</div>
      </div>
      <div class="prop-row">
        <div class="prop-label">name</div>
        <input class="prop-input" id="prop-name" type="text" value="" onchange="updateBoneProp('name', this.value)">
      </div>
    </div>
  </div>

  <!-- CENTER CANVAS -->
  <div id="center">
    <div id="canvas-toolbar">
      <div style="font-size:10px;color:var(--muted);letter-spacing:1px;">CANVAS</div>
      <div class="topbar-sep"></div>
      <button class="tool-btn active" onclick="setTool('select')">SELECT</button>
      <button class="tool-btn" onclick="setTool('add')">ADD</button>
      <button class="tool-btn" onclick="setTool('move')">MOVE</button>
      <button class="tool-btn" onclick="setTool('rotate')">ROTATE</button>
      <div id="play-indicator">
        <div class="play-dot" id="play-dot"></div>
        <span id="play-text">STOPPED</span>
      </div>
    </div>
    <div id="canvas-wrap">
      <canvas id="main-canvas"></canvas>
      <div id="coords">x: 0  y: 0</div>
    </div>

    <!-- TIMELINE -->
    <div id="timeline">
      <div id="timeline-header">
        <span style="font-size:10px;letter-spacing:1px;color:var(--muted);">TIMELINE</span>
        <div class="topbar-sep"></div>
        <span id="current-time-display" style="font-size:11px;color:var(--accent);">0.00s</span>
        <span style="font-size:10px;color:var(--muted)"> / </span>
        <span id="total-time-display" style="font-size:11px;color:var(--muted);">2.00s</span>
        <div style="margin-left:auto;display:flex;gap:6px;">
          <input type="range" id="duration-slider" min="1" max="10" value="2" step="0.5"
            style="width:80px;accent-color:var(--accent);" oninput="setDuration(this.value)">
          <span style="font-size:10px;color:var(--muted)">DUR</span>
        </div>
      </div>
      <div id="timeline-track">
        <canvas id="timeline-canvas"></canvas>
      </div>
    </div>

    <!-- CODE OUTPUT -->
    <div id="code-section">
      <div id="code-header">
        <div id="code-title">HTML Canvas Code</div>
        <button class="copy-btn" id="copy-btn" onclick="copyCode()">COPY</button>
      </div>
      <textarea id="code-output" readonly></textarea>
    </div>

    <!-- STATUS BAR -->
    <div class="status-bar">
      <div class="status-item">Bones: <span id="status-bones">0</span></div>
      <div class="status-item">Selected: <span id="status-sel">none</span></div>
      <div class="status-item">Keyframes: <span id="status-kf">0</span></div>
      <div class="status-item">Tool: <span id="status-tool">select</span></div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right-panel">
    <div class="panel-title">Keyframes</div>
    <div id="keyframe-section">
      <div id="keyframe-list"></div>
      <div class="kf-btn-row">
        <button class="kf-btn" onclick="addKeyframe()">+ ADD KF</button>
        <button class="kf-btn" onclick="deleteKeyframe()">✕ DEL KF</button>
      </div>
      <div class="kf-btn-row">
        <button class="kf-btn play-btn" onclick="togglePlay()">▶ PLAY</button>
        <button class="kf-btn" onclick="stopAnim()">■ STOP</button>
      </div>
    </div>
  </div>

</div>

<script>
// ===================== STATE =====================
let bones = [];
let keyframes = [];
let selectedBoneId = null;
let selectedKeyframeIdx = null;
let tool = 'select';
let isPlaying = false;
let playTime = 0;
let duration = 2;
let animFrame = null;
let lastTimestamp = null;
let boneCounter = 0;
let isDragging = false;
let dragOffsetX = 0, dragOffsetY = 0;
let rotateStartAngle = 0;
let rotateStartMouse = 0;

// ===================== CANVAS SETUP =====================
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
const tlCanvas = document.getElementById('timeline-canvas');
const tlCtx = tlCanvas.getContext('2d');

function resizeCanvases() {
  const wrap = document.getElementById('canvas-wrap');
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  const tlTrack = document.getElementById('timeline-track');
  tlCanvas.width = Math.max(tlTrack.clientWidth, 600);
  tlCanvas.height = tlTrack.clientHeight;
  render();
  renderTimeline();
}

window.addEventListener('resize', resizeCanvases);
setTimeout(resizeCanvases, 50);

// ===================== BONE CREATION =====================
function makeBone(type, x, y) {
  boneCounter++;
  const id = 'bone_' + boneCounter;
  let bone = { id, name: type + boneCounter, type, x, y, angle: 0 };
  if (type === 'rect') { bone.w = 70; bone.h = 16; }
  else if (type === 'circle') { bone.w = 24; bone.h = 24; }
  else if (type === 'line') { bone.w = 80; bone.h = 6; }
  return bone;
}

function addRectangleBone() {
  const b = makeBone('rect', canvas.width/2 - 35, canvas.height/2 - 8);
  bones.push(b);
  selectBone(b.id);
  refreshBoneList();
  render();
  generateCode();
}

function addCircleBone() {
  const b = makeBone('circle', canvas.width/2 - 12, canvas.height/2 - 12);
  bones.push(b);
  selectBone(b.id);
  refreshBoneList();
  render();
  generateCode();
}

function addLineBone() {
  const b = makeBone('line', canvas.width/2 - 40, canvas.height/2 - 3);
  bones.push(b);
  selectBone(b.id);
  refreshBoneList();
  render();
  generateCode();
}

function deleteSelected() {
  if (!selectedBoneId) return;
  bones = bones.filter(b => b.id !== selectedBoneId);
  // Remove keyframes for this bone
  keyframes = keyframes.filter(kf => kf.boneId !== selectedBoneId);
  selectedBoneId = null;
  refreshBoneList();
  refreshKeyframeList();
  render();
  generateCode();
  updateProps();
  updateStatus();
}

// ===================== SELECTION =====================
function selectBone(id) {
  selectedBoneId = id;
  refreshBoneList();
  updateProps();
  updateStatus();
}

function getBone(id) { return bones.find(b => b.id === id); }

// ===================== PROPS =====================
function updateProps() {
  const b = getBone(selectedBoneId);
  document.getElementById('prop-x').value = b ? Math.round(b.x) : '';
  document.getElementById('prop-y').value = b ? Math.round(b.y) : '';
  document.getElementById('prop-w').value = b ? Math.round(b.w) : '';
  document.getElementById('prop-h').value = b ? Math.round(b.h) : '';
  document.getElementById('prop-angle').value = b ? Math.round(b.angle) : '';
  document.getElementById('prop-name').value = b ? b.name : '';
}

function updateBoneProp(key, val) {
  const b = getBone(selectedBoneId);
  if (!b) return;
  if (key === 'name') b.name = val;
  else b[key] = parseFloat(val) || 0;
  refreshBoneList();
  render();
  generateCode();
}

// ===================== BONE LIST UI =====================
function refreshBoneList() {
  const list = document.getElementById('bones-list');
  list.innerHTML = '';
  bones.forEach(b => {
    const div = document.createElement('div');
    div.className = 'bone-item' + (b.id === selectedBoneId ? ' selected' : '');
    div.innerHTML = `<div class="bone-dot"></div><span>${b.name}</span><span style="font-size:9px;color:#444;margin-left:auto">${b.type}</span>`;
    div.onclick = () => { selectBone(b.id); render(); };
    list.appendChild(div);
  });
  updateStatus();
}

// ===================== KEYFRAMES =====================
function addKeyframe() {
  if (!selectedBoneId) return;
  const b = getBone(selectedBoneId);
  if (!b) return;
  const t = parseFloat(prompt('Keyframe time (seconds):', (playTime).toFixed(2)));
  if (isNaN(t)) return;
  keyframes.push({
    boneId: b.id,
    boneName: b.name,
    time: Math.max(0, Math.min(duration, t)),
    x: b.x, y: b.y, angle: b.angle, w: b.w, h: b.h
  });
  keyframes.sort((a, b) => a.time - b.time);
  refreshKeyframeList();
  renderTimeline();
  generateCode();
  updateStatus();
}

function deleteKeyframe() {
  if (selectedKeyframeIdx === null) return;
  keyframes.splice(selectedKeyframeIdx, 1);
  selectedKeyframeIdx = null;
  refreshKeyframeList();
  renderTimeline();
  generateCode();
  updateStatus();
}

function refreshKeyframeList() {
  const list = document.getElementById('keyframe-list');
  list.innerHTML = '';
  keyframes.forEach((kf, i) => {
    const div = document.createElement('div');
    div.className = 'keyframe-item' + (i === selectedKeyframeIdx ? ' selected' : '');
    div.innerHTML = `<span>${kf.boneName}</span><span class="kf-time">${kf.time.toFixed(2)}s</span>`;
    div.onclick = () => {
      selectedKeyframeIdx = i;
      playTime = kf.time;
      applyKeyframe(kf.time);
      refreshKeyframeList();
      renderTimeline();
    };
    list.appendChild(div);
  });
  updateStatus();
}

// ===================== INTERPOLATION =====================
function applyKeyframe(t) {
  bones.forEach(bone => {
    const bKfs = keyframes.filter(kf => kf.boneId === bone.id);
    if (bKfs.length === 0) return;
    if (bKfs.length === 1) {
      Object.assign(bone, { x: bKfs[0].x, y: bKfs[0].y, angle: bKfs[0].angle });
      return;
    }
    // Find surrounding keyframes
    let before = null, after = null;
    for (let i = 0; i < bKfs.length; i++) {
      if (bKfs[i].time <= t) before = bKfs[i];
      if (bKfs[i].time >= t && !after) after = bKfs[i];
    }
    if (!before) before = bKfs[0];
    if (!after) after = bKfs[bKfs.length - 1];
    if (before === after) {
      Object.assign(bone, { x: before.x, y: before.y, angle: before.angle });
      return;
    }
    const dt = after.time - before.time;
    const alpha = dt === 0 ? 0 : (t - before.time) / dt;
    // Smooth step
    const smooth = alpha * alpha * (3 - 2 * alpha);
    bone.x = before.x + (after.x - before.x) * smooth;
    bone.y = before.y + (after.y - before.y) * smooth;
    bone.angle = before.angle + (after.angle - before.angle) * smooth;
  });
  render();
  updateProps();
}

// ===================== PLAYBACK =====================
function togglePlay() {
  if (isPlaying) { stopAnim(); return; }
  isPlaying = true;
  lastTimestamp = null;
  document.getElementById('play-dot').classList.add('active');
  document.getElementById('play-text').textContent = 'PLAYING';
  document.getElementById('btn-play').textContent = '■ STOP';
  animFrame = requestAnimationFrame(animLoop);
}

function stopAnim() {
  isPlaying = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  playTime = 0;
  document.getElementById('play-dot').classList.remove('active');
  document.getElementById('play-text').textContent = 'STOPPED';
  document.getElementById('btn-play').textContent = '▶ PLAY';
  document.getElementById('current-time-display').textContent = '0.00s';
  applyKeyframe(0);
  renderTimeline();
}

function animLoop(ts) {
  if (!isPlaying) return;
  if (lastTimestamp === null) lastTimestamp = ts;
  const dt = (ts - lastTimestamp) / 1000;
  lastTimestamp = ts;
  playTime += dt;
  if (playTime > duration) playTime = 0;
  applyKeyframe(playTime);
  document.getElementById('current-time-display').textContent = playTime.toFixed(2) + 's';
  renderTimeline();
  animFrame = requestAnimationFrame(animLoop);
}

function setDuration(val) {
  duration = parseFloat(val);
  document.getElementById('total-time-display').textContent = duration.toFixed(2) + 's';
  renderTimeline();
}

// ===================== RENDERING =====================
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw origin cross
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(canvas.width/2, 0);
  ctx.lineTo(canvas.width/2, canvas.height);
  ctx.moveTo(0, canvas.height/2);
  ctx.lineTo(canvas.width, canvas.height/2);
  ctx.stroke();

  bones.forEach(b => drawBone(ctx, b));
}

function drawBone(c, b) {
  const isSelected = b.id === selectedBoneId;
  const cx = b.x + b.w / 2;
  const cy = b.y + b.h / 2;
  const rad = b.angle * Math.PI / 180;

  c.save();
  c.translate(cx, cy);
  c.rotate(rad);

  if (b.type === 'circle') {
    const r = b.w / 2;
    c.beginPath();
    c.arc(0, 0, r, 0, Math.PI * 2);
    if (isSelected) {
      c.fillStyle = 'rgba(200, 240, 37, 0.15)';
      c.strokeStyle = '#c8f025';
      c.lineWidth = 2;
    } else {
      c.fillStyle = 'rgba(255,255,255,0.08)';
      c.strokeStyle = 'rgba(255,255,255,0.6)';
      c.lineWidth = 1.5;
    }
    c.fill();
    c.stroke();
    // Center dot
    c.beginPath();
    c.arc(0, 0, 3, 0, Math.PI * 2);
    c.fillStyle = isSelected ? '#c8f025' : 'rgba(255,255,255,0.5)';
    c.fill();
  } else {
    const hw = b.w / 2, hh = b.h / 2;
    c.beginPath();
    c.roundRect(-hw, -hh, b.w, b.h, b.type === 'line' ? 3 : 5);
    if (isSelected) {
      c.fillStyle = 'rgba(200, 240, 37, 0.12)';
      c.strokeStyle = '#c8f025';
      c.lineWidth = 2;
    } else {
      c.fillStyle = 'rgba(255,255,255,0.06)';
      c.strokeStyle = 'rgba(255,255,255,0.55)';
      c.lineWidth = 1.5;
    }
    c.fill();
    c.stroke();

    // Pivot dot
    c.beginPath();
    c.arc(0, 0, 3, 0, Math.PI * 2);
    c.fillStyle = isSelected ? '#c8f025' : 'rgba(255,255,255,0.4)';
    c.fill();

    // Bone end caps
    if (b.type !== 'circle') {
      c.beginPath();
      c.arc(-hw, 0, 5, 0, Math.PI * 2);
      c.arc(hw, 0, 5, 0, Math.PI * 2);
      c.fillStyle = isSelected ? 'rgba(200,240,37,0.3)' : 'rgba(255,255,255,0.15)';
      c.fill();
    }
  }

  // Name label
  c.fillStyle = isSelected ? '#c8f025' : 'rgba(255,255,255,0.4)';
  c.font = `bold 10px JetBrains Mono, monospace`;
  c.textAlign = 'left';
  c.fillText(b.name, -b.w/2, -b.h/2 - 5);

  // Selection handles
  if (isSelected) {
    const hw = b.w / 2, hh = b.h / 2;
    const corners = [[-hw, -hh], [hw, -hh], [hw, hh], [-hw, hh]];
    corners.forEach(([cx2, cy2]) => {
      c.beginPath();
      c.rect(cx2 - 4, cy2 - 4, 8, 8);
      c.fillStyle = '#c8f025';
      c.fill();
    });
  }

  c.restore();
}

// ===================== TIMELINE RENDERING =====================
function renderTimeline() {
  const w = tlCanvas.width, h = tlCanvas.height;
  tlCtx.clearRect(0, 0, w, h);

  tlCtx.fillStyle = '#111';
  tlCtx.fillRect(0, 0, w, h);

  // Time ruler
  const pxPerSec = (w - 40) / duration;
  tlCtx.strokeStyle = '#2a2a2a';
  tlCtx.lineWidth = 1;
  for (let t = 0; t <= duration; t += 0.25) {
    const x = 20 + t * pxPerSec;
    tlCtx.beginPath();
    tlCtx.moveTo(x, t % 1 === 0 ? 0 : 10);
    tlCtx.lineTo(x, h);
    tlCtx.stroke();
    if (t % 0.5 === 0) {
      tlCtx.fillStyle = '#444';
      tlCtx.font = '9px JetBrains Mono';
      tlCtx.fillText(t.toFixed(1) + 's', x - 8, 10);
    }
  }

  // Bone tracks
  const boneIds = [...new Set(keyframes.map(kf => kf.boneId))];
  boneIds.forEach((bid, row) => {
    const y = 20 + row * 16;
    // Track line
    tlCtx.strokeStyle = '#1e1e1e';
    tlCtx.lineWidth = 12;
    tlCtx.beginPath();
    tlCtx.moveTo(20, y + 6);
    tlCtx.lineTo(w - 20, y + 6);
    tlCtx.stroke();

    // Line between keyframes
    const bKfs = keyframes.filter(kf => kf.boneId === bid);
    if (bKfs.length > 1) {
      tlCtx.strokeStyle = 'rgba(200,240,37,0.2)';
      tlCtx.lineWidth = 2;
      tlCtx.beginPath();
      bKfs.forEach((kf, i) => {
        const x = 20 + kf.time * pxPerSec;
        if (i === 0) tlCtx.moveTo(x, y + 6);
        else tlCtx.lineTo(x, y + 6);
      });
      tlCtx.stroke();
    }

    // Keyframe diamonds
    bKfs.forEach(kf => {
      const x = 20 + kf.time * pxPerSec;
      tlCtx.save();
      tlCtx.translate(x, y + 6);
      tlCtx.rotate(Math.PI / 4);
      tlCtx.fillStyle = '#c8f025';
      tlCtx.fillRect(-5, -5, 10, 10);
      tlCtx.restore();
    });
  });

  // Playhead
  const px = 20 + playTime * pxPerSec;
  tlCtx.strokeStyle = '#f0a825';
  tlCtx.lineWidth = 2;
  tlCtx.beginPath();
  tlCtx.moveTo(px, 0);
  tlCtx.lineTo(px, h);
  tlCtx.stroke();
  // Triangle
  tlCtx.fillStyle = '#f0a825';
  tlCtx.beginPath();
  tlCtx.moveTo(px - 6, 0);
  tlCtx.lineTo(px + 6, 0);
  tlCtx.lineTo(px, 10);
  tlCtx.fill();
}

// ===================== MOUSE EVENTS =====================
canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (tool === 'select' || tool === 'move') {
    // Hit test
    let hit = null;
    for (let i = bones.length - 1; i >= 0; i--) {
      if (hitTest(bones[i], mx, my)) { hit = bones[i]; break; }
    }
    if (hit) {
      selectBone(hit.id);
      isDragging = true;
      dragOffsetX = mx - hit.x;
      dragOffsetY = my - hit.y;
    } else {
      selectedBoneId = null;
      refreshBoneList();
      updateProps();
    }
    render();
  } else if (tool === 'rotate') {
    const b = getBone(selectedBoneId);
    if (b && hitTest(b, mx, my)) {
      isDragging = true;
      const cx = b.x + b.w / 2;
      const cy = b.y + b.h / 2;
      rotateStartAngle = b.angle;
      rotateStartMouse = Math.atan2(my - cy, mx - cx) * 180 / Math.PI;
    }
  } else if (tool === 'add') {
    const bone = makeBone('rect', mx - 35, my - 8);
    bones.push(bone);
    selectBone(bone.id);
    refreshBoneList();
    render();
    generateCode();
  }
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  document.getElementById('coords').textContent = `x: ${Math.round(mx)}  y: ${Math.round(my)}`;

  if (!isDragging) return;
  const b = getBone(selectedBoneId);
  if (!b) return;

  if (tool === 'rotate') {
    const cx = b.x + b.w / 2, cy = b.y + b.h / 2;
    const angle = Math.atan2(my - cy, mx - cx) * 180 / Math.PI;
    b.angle = rotateStartAngle + (angle - rotateStartMouse);
  } else {
    b.x = mx - dragOffsetX;
    b.y = my - dragOffsetY;
  }
  updateProps();
  render();
  generateCode();
});

canvas.addEventListener('mouseup', () => { isDragging = false; });
canvas.addEventListener('mouseleave', () => { isDragging = false; });

// Timeline click to seek
tlCanvas.addEventListener('click', e => {
  const rect = tlCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const pxPerSec = (tlCanvas.width - 40) / duration;
  playTime = Math.max(0, Math.min(duration, (mx - 20) / pxPerSec));
  document.getElementById('current-time-display').textContent = playTime.toFixed(2) + 's';
  applyKeyframe(playTime);
  renderTimeline();
});

function hitTest(b, mx, my) {
  const cx = b.x + b.w / 2;
  const cy = b.y + b.h / 2;
  const rad = -b.angle * Math.PI / 180;
  const dx = mx - cx, dy = my - cy;
  const lx = dx * Math.cos(rad) - dy * Math.sin(rad);
  const ly = dx * Math.sin(rad) + dy * Math.cos(rad);
  if (b.type === 'circle') return Math.sqrt(lx*lx + ly*ly) <= b.w / 2 + 5;
  return Math.abs(lx) <= b.w / 2 + 5 && Math.abs(ly) <= b.h / 2 + 5;
}

// ===================== TOOL SWITCHING =====================
function setTool(t) {
  tool = t;
  document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('status-tool').textContent = t;
  // Update cursor
  canvas.style.cursor = t === 'rotate' ? 'grab' : t === 'add' ? 'crosshair' : 'default';
}

document.getElementById('btn-select').onclick = () => setTool('select');
document.getElementById('btn-add-bone').onclick = () => setTool('add');
document.getElementById('btn-move').onclick = () => setTool('move');
document.getElementById('btn-rotate').onclick = () => setTool('rotate');
document.getElementById('btn-play').onclick = togglePlay;
document.getElementById('btn-stop').onclick = stopAnim;
document.getElementById('btn-clear').onclick = () => {
  if (!confirm('Clear all bones and keyframes?')) return;
  bones = []; keyframes = [];
  selectedBoneId = null; selectedKeyframeIdx = null;
  refreshBoneList(); refreshKeyframeList();
  render(); renderTimeline(); generateCode();
};

// ===================== CODE GENERATION =====================
function generateCode() {
  if (bones.length === 0) {
    document.getElementById('code-output').value = '// No bones added yet';
    return;
  }

  const hasAnim = keyframes.length > 0;
  let code = '';

  if (hasAnim) {
    code += `<!DOCTYPE html>\n<html>\n<head><style>body{margin:0;background:#111;}</style></head>\n<body>\n`;
    code += `<canvas id="c" width="600" height="400"></canvas>\n<script>\n`;
    code += `const ctx = document.getElementById('c').getContext('2d');\n`;
    code += `const bones = ${JSON.stringify(bones.map(b => ({...b})), null, 2)};\n`;
    code += `const keyframes = ${JSON.stringify(keyframes, null, 2)};\n`;
    code += `const duration = ${duration};\n`;
    code += `let t = 0, last = null;\n\n`;
    code += `function lerp(a,b,t){return a+(b-a)*t}\n`;
    code += `function smooth(t){return t*t*(3-2*t)}\n\n`;
    code += `function interpolate(bone, time) {\n`;
    code += `  const kfs = keyframes.filter(k=>k.boneId===bone.id).sort((a,b)=>a.time-b.time);\n`;
    code += `  if(!kfs.length) return;\n`;
    code += `  let a=kfs[0], b=kfs[kfs.length-1];\n`;
    code += `  for(let i=0;i<kfs.length-1;i++) if(kfs[i].time<=time&&kfs[i+1].time>=time){a=kfs[i];b=kfs[i+1];break;}\n`;
    code += `  const dt=b.time-a.time, alpha=dt?smooth((time-a.time)/dt):0;\n`;
    code += `  bone.x=lerp(a.x,b.x,alpha); bone.y=lerp(a.y,b.y,alpha); bone.angle=lerp(a.angle,b.angle,alpha);\n`;
    code += `}\n\n`;
    code += `function drawBone(b) {\n`;
    code += `  const cx=b.x+b.w/2, cy=b.y+b.h/2;\n`;
    code += `  ctx.save(); ctx.translate(cx,cy); ctx.rotate(b.angle*Math.PI/180);\n`;
    code += `  ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.strokeStyle='white'; ctx.lineWidth=1.5;\n`;
    code += `  if(b.type==='circle'){ctx.beginPath();ctx.arc(0,0,b.w/2,0,Math.PI*2);ctx.fill();ctx.stroke();}\n`;
    code += `  else{ctx.beginPath();ctx.roundRect(-b.w/2,-b.h/2,b.w,b.h,4);ctx.fill();ctx.stroke();}\n`;
    code += `  ctx.restore();\n}\n\n`;
    code += `function loop(ts) {\n`;
    code += `  if(!last) last=ts;\n`;
    code += `  t=(t+(ts-last)/1000)%duration; last=ts;\n`;
    code += `  ctx.clearRect(0,0,600,400);\n`;
    code += `  bones.forEach(b=>{interpolate(b,t);drawBone(b);});\n`;
    code += `  requestAnimationFrame(loop);\n}\n`;
    code += `requestAnimationFrame(loop);\n<\/script>\n</body>\n</html>`;
  } else {
    // Static code
    code += `<canvas id="c" width="600" height="400"></canvas>\n<script>\n`;
    code += `const ctx = document.getElementById('c').getContext('2d');\n`;
    code += `ctx.strokeStyle = 'white'; ctx.lineWidth = 1.5;\n\n`;
    bones.forEach(b => {
      const cx = b.x + b.w/2, cy = b.y + b.h/2;
      code += `// ${b.name}\n`;
      code += `ctx.save();\nctx.translate(${Math.round(cx)}, ${Math.round(cy)});\nctx.rotate(${(b.angle * Math.PI / 180).toFixed(4)});\n`;
      if (b.type === 'circle') {
        code += `ctx.beginPath(); ctx.arc(0, 0, ${Math.round(b.w/2)}, 0, Math.PI*2); ctx.stroke();\n`;
      } else {
        code += `ctx.beginPath(); ctx.roundRect(${-Math.round(b.w/2)}, ${-Math.round(b.h/2)}, ${Math.round(b.w)}, ${Math.round(b.h)}, 4); ctx.stroke();\n`;
      }
      code += `ctx.restore();\n\n`;
    });
    code += `<\/script>`;
  }

  document.getElementById('code-output').value = code;
}

function copyCode() {
  const code = document.getElementById('code-output').value;
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ COPIED';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 1500);
  });
}

// ===================== STATUS =====================
function updateStatus() {
  document.getElementById('status-bones').textContent = bones.length;
  document.getElementById('status-sel').textContent = selectedBoneId ? (getBone(selectedBoneId)?.name || 'none') : 'none';
  document.getElementById('status-kf').textContent = keyframes.length;
}

// ===================== INIT: DEFAULT SKELETON =====================
function initDefaultSkeleton() {
  const cx = 300, cy = 200;
  // Torso
  const torso = { id: 'bone_torso', name: 'torso', type: 'rect', x: cx-15, y: cy-40, w: 30, h: 80, angle: 0 };
  // Head
  const head = { id: 'bone_head', name: 'head', type: 'circle', x: cx-20, y: cy-80, w: 40, h: 40, angle: 0 };
  // Left arm
  const armL = { id: 'bone_armL', name: 'arm_L', type: 'rect', x: cx-65, y: cy-35, w: 55, h: 12, angle: -20 };
  // Right arm
  const armR = { id: 'bone_armR', name: 'arm_R', type: 'rect', x: cx+10, y: cy-35, w: 55, h: 12, angle: 20 };
  // Left leg
  const legL = { id: 'bone_legL', name: 'leg_L', type: 'rect', x: cx-28, y: cy+42, w: 14, h: 60, angle: -8 };
  // Right leg
  const legR = { id: 'bone_legR', name: 'leg_R', type: 'rect', x: cx+14, y: cy+42, w: 14, h: 60, angle: 8 };

  bones = [torso, head, armL, armR, legL, legR];
  boneCounter = 6;
  refreshBoneList();
  render();
  generateCode();
}

initDefaultSkeleton();
resizeCanvases();
